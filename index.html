<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Richard Rich — We Transform Businesses Through AI</title>
  <meta name="description" content="Richard Rich — an AI agency that transforms and grows businesses through artificial intelligence. It's not a deal, it's a partnership." />
  <meta name="monetag" content="3e64ac247d960e435817b484be12564e">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ============ NAVBAR ============ -->
  <header class="nav" id="nav">
    <a class="brand" href="#top" aria-label="Richard Rich home">
      <span class="brand-mark">RR</span>
      <span class="brand-text">Richard&nbsp;Rich</span>
    </a>
    <div class="nav-right"></div>
  </header>

  <!-- ============ PERSISTENT CINEMATIC WORLD (one continuous moonscape) ============ -->
  <div class="world" aria-hidden="true">
    <div class="world-moon" id="worldMoon"></div>
    <canvas class="stars" id="stars"></canvas>
    <canvas class="dust" id="dust"></canvas>
    <div class="world-glow" id="worldGlow"></div>
    <div class="world-atmos"></div>
  </div>

  <span id="top"></span>

  <!-- ============ CARDS — rise over the moonscape ============ -->
  <section class="deck" id="deck">
    <div class="deck-pin" id="deckPin">
      <div class="deck-stage" id="deckStage"><!-- cards injected by JS --></div>
      <div class="deck-progress" id="deckProgress" aria-hidden="true"></div>
    </div>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer class="footer" id="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="brand-mark">RR</span>
        <span>Richard Rich</span>
      </div>
      <p class="footer-tag">It's not a deal — it's a partnership.</p>
      <a class="footer-mail" href="mailto:richardrich9888@gmail.com">richardrich9888@gmail.com</a>
      <p class="footer-copy">© <span id="year"></span> Richard Rich. All rights reserved.</p>
    </div>
  </footer>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
